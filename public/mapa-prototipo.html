<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reportes - Cantón Quijos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        #map-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 0.75rem;
            background-color: white;
            overflow: hidden;
        }

        .parroquia {
            transition: all 0.3s ease;
            cursor: pointer;
            stroke: #333;
            stroke-width: 1.2;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .parroquia:hover {
            filter: brightness(1.1) drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            transform: scale(1.01);
            transform-origin: center;
            z-index: 10;
            stroke-width: 2;
        }

        .parroquia.active {
            stroke: #000;
            stroke-width: 2.5;
            filter: brightness(1.15) drop-shadow(0 0 8px rgba(0,0,0,0.4));
            z-index: 20;
        }

        #side-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }

        #side-panel.open {
            transform: translateX(0);
        }

        .svg-text {
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            fill: #000;
            pointer-events: none;
            text-anchor: middle;
        }

        .svg-label-small {
             font-family: Arial, sans-serif;
             font-size: 11px;
             fill: #333;
             pointer-events: none;
        }

        .svg-main-title {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            fill: #000;
            pointer-events: none;
            text-anchor: middle;
        }

        .simbologia-text {
            font-family: Arial, sans-serif;
            font-size: 10px;
            fill: #000;
        }
        .simbologia-title {
            font-family: Arial, sans-serif;
            font-size: 11px;
            font-weight: bold;
            fill: #000;
            text-anchor: middle;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <header class="bg-white shadow-sm p-4 z-10 relative flex items-center justify-between">
        <a href="/admin/stats" class="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium rounded-lg transition-colors">
            &#8592; Volver
        </a>
        <div class="text-center flex-1">
            <h1 class="text-2xl font-bold text-slate-800">Mapa Interactivo - Cantón Quijos</h1>
            <p class="text-slate-500 text-sm">Haz clic en una parroquia para gestionar reportes</p>
        </div>
        <div class="w-24"></div>
    </header>

    <div class="flex-1 flex overflow-hidden relative w-full">

        <main class="flex-1 p-4 flex items-center justify-center overflow-auto bg-slate-100">
            <div id="map-container" class="w-full h-full flex items-center justify-center">
                <svg viewBox="0 0 1000 600" class="w-full h-full max-h-full" preserveAspectRatio="xMidYMid meet">

                    <!-- Fondo Blanco -->
                    <rect width="1000" height="600" fill="white" />

                    <!-- Vías Principales (Líneas referenciales finas en el fondo) -->
                    <path d="M 0 250 Q 150 200, 470 280 Q 600 250, 800 150" fill="none" stroke="#666" stroke-width="1"/>
                    <path d="M 470 280 Q 400 400, 450 600" fill="none" stroke="#666" stroke-width="1"/>

                    <!-- Papallacta (Amarillo) -->
                    <path id="papallacta" class="parroquia" fill="#FFF983"
                          d="M 285 50 L 270 30 L 250 20 L 220 15 L 180 25 L 150 40 L 130 60 L 110 80 L 90 110 L 70 140 L 60 160 L 70 190 L 55 220 L 50 260 L 65 300 L 90 330 L 120 350 L 160 370 L 190 380 L 210 375 L 220 350 L 230 320 L 235 280 L 245 240 L 260 200 L 275 160 L 285 120 L 280 80 L 285 50 Z" />

                    <!-- Cuyuja (Salmón) -->
                    <path id="cuyuja" class="parroquia" fill="#FA9B8F"
                          d="M 285 50 L 300 70 L 320 90 L 350 120 L 380 145 L 410 165 L 440 185 L 415 220 L 395 250 L 380 285 L 365 315 L 350 345 L 330 365 L 300 380 L 270 390 L 240 385 L 210 375 L 220 350 L 230 320 L 235 280 L 245 240 L 260 200 L 275 160 L 285 120 L 280 80 L 285 50 Z" />

                    <!-- Baeza (Verde) -->
                    <path id="baeza" class="parroquia" fill="#00933C"
                          d="M 440 185 L 455 180 L 475 185 L 495 190 L 515 200 L 535 210 L 545 230 L 550 260 L 560 290 L 570 320 L 580 350 L 540 365 L 500 375 L 460 375 L 420 370 L 380 360 L 350 345 L 365 315 L 380 285 L 395 250 L 415 220 L 440 185 Z" />

                    <!-- San Francisco de Borja (Naranja) -->
                    <path id="borja" class="parroquia" fill="#FBB040"
                          d="M 535 210 L 555 205 L 575 200 L 595 195 L 620 205 L 645 220 L 640 245 L 645 275 L 655 305 L 665 335 L 640 345 L 610 355 L 580 350 L 570 320 L 560 290 L 550 260 L 545 230 L 535 210 Z" />

                    <!-- Sumaco (Rosa) -->
                    <path id="sumaco" class="parroquia" fill="#F07DBC"
                          d="M 645 220 L 670 215 L 700 215 L 740 210 L 780 225 L 820 240 L 860 260 L 900 275 L 940 290 L 970 310 L 980 330 L 960 345 L 930 355 L 890 365 L 850 380 L 815 385 L 790 370 L 760 355 L 730 350 L 700 345 L 665 335 L 655 305 L 645 275 L 640 245 L 645 220 Z" />

                    <!-- Cosanga (Terracota) -->
                    <path id="cosanga" class="parroquia" fill="#F18E65"
                          d="M 210 375 L 240 385 L 270 390 L 300 380 L 330 365 L 350 345 L 380 360 L 420 370 L 460 375 L 500 375 L 540 365 L 580 350 L 610 355 L 640 345 L 665 335 L 700 345 L 730 350 L 760 355 L 790 370 L 815 385 L 790 420 L 760 460 L 720 490 L 680 510 L 640 520 L 590 535 L 540 555 L 490 565 L 440 560 L 390 540 L 340 510 L 290 480 L 250 450 L 220 410 L 210 375 Z" />

                    <!-- TEXTOS PARROQUIAS -->
                    <text x="160" y="200" class="svg-text">PAPALLACTA</text>
                    <text x="320" y="220" class="svg-text">CUYUJA</text>
                    <text x="470" y="290" class="svg-text" fill="white">BAEZA</text>
                    <text x="590" y="265" class="svg-text">SAN FRANCISCO</text>
                    <text x="590" y="280" class="svg-text">DE BORJA</text>
                    <text x="760" y="310" class="svg-text">SUMACO</text>
                    <text x="500" y="450" class="svg-text">COSANGA</text>

                    <!-- MARCADORES -->
                    <g transform="translate(160, 220)"><circle cx="0" cy="0" r="6" fill="white" stroke="black" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="black"/></g>
                    <g transform="translate(320, 240)"><circle cx="0" cy="0" r="6" fill="white" stroke="black" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="black"/></g>
                    <!-- Baeza (Cabecera Cantonal: Doble anillo) -->
                    <g transform="translate(470, 310)"><circle cx="0" cy="0" r="8" fill="white" stroke="black" stroke-width="1.5"/><circle cx="0" cy="0" r="4" fill="none" stroke="black" stroke-width="1"/><circle cx="0" cy="0" r="2" fill="black"/></g>
                    <g transform="translate(590, 300)"><circle cx="0" cy="0" r="6" fill="white" stroke="black" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="black"/></g>
                    <g transform="translate(760, 330)"><circle cx="0" cy="0" r="6" fill="white" stroke="black" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="black"/></g>
                    <g transform="translate(500, 470)"><circle cx="0" cy="0" r="6" fill="white" stroke="black" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="black"/></g>

                    <!-- ETIQUETAS EXTERNAS -->
                    <text x="50"  y="80"  class="svg-label-small font-bold">CANTON QUITO</text>
                    <text x="400" y="80"  class="svg-label-small font-bold">CANTON EL CHACO</text>
                    <text x="750" y="140" class="svg-label-small font-bold">A LAGO AGRIO</text>
                    <text x="880" y="420" class="svg-label-small font-bold">CANTON LORETO</text>
                    <text x="50"  y="500" class="svg-label-small font-bold">CANTON ARCHIDONA</text>
                    <text x="450" y="580" class="svg-label-small font-bold">CANTON ARCHIDONA</text>

                    <!-- TITULO PRINCIPAL -->
                    <text x="700" y="50" class="svg-main-title">CANTON QUIJOS</text>

                    <!-- ROSA DE LOS VIENTOS -->
                    <g transform="translate(580, 100)">
                        <circle cx="0" cy="0" r="20" fill="none" stroke="black" stroke-width="1"/>
                        <circle cx="0" cy="0" r="14" fill="none" stroke="black" stroke-width="0.5"/>
                        <path d="M0,-25 L5,-12 L0,-15 L-5,-12 Z" fill="black"/>
                        <text x="0" y="-30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">N</text>
                        <path d="M0,-20 L3,-3 L20,0 L3,3 L0,20 L-3,3 L-20,0 L-3,-3 Z" fill="none" stroke="black" stroke-width="1"/>
                        <path d="M0,-20 L0,20 M-20,0 L20,0" stroke="black" stroke-width="1"/>
                    </g>

                    <!-- SIMBOLOGIA -->
                    <g transform="translate(820, 20)">
                        <rect x="0" y="0" width="160" height="180" fill="white" stroke="black" stroke-width="1.5"/>
                        <text x="80" y="20" class="simbologia-title">SIMBOLOGIA</text>
                        <line x1="10" y1="28" x2="150" y2="28" stroke="black" stroke-width="1"/>
                        <g transform="translate(10, 45)">
                            <text x="0" y="5"   class="simbologia-text">Cabecera Cantonal</text>
                            <g transform="translate(130, 2)"><circle cx="0" cy="0" r="5" fill="white" stroke="black" stroke-width="1"/><circle cx="0" cy="0" r="2.5" fill="none" stroke="black" stroke-width="0.5"/><circle cx="0" cy="0" r="1" fill="black"/></g>
                            <text x="0" y="25"  class="simbologia-text">Parroquias</text>
                            <g transform="translate(130, 22)"><circle cx="0" cy="0" r="4" fill="white" stroke="black" stroke-width="1"/><circle cx="0" cy="0" r="1.5" fill="black"/></g>
                            <text x="0" y="50"  class="simbologia-text">PAPALLACTA</text><rect x="120" y="42"  width="20" height="10" fill="#FFF983" stroke="black" stroke-width="0.5"/>
                            <text x="0" y="70"  class="simbologia-text">CUYUJA</text>    <rect x="120" y="62"  width="20" height="10" fill="#FA9B8F" stroke="black" stroke-width="0.5"/>
                            <text x="0" y="90"  class="simbologia-text">BAEZA</text>     <rect x="120" y="82"  width="20" height="10" fill="#00933C" stroke="black" stroke-width="0.5"/>
                            <text x="0" y="110" class="simbologia-text">BORJA</text>     <rect x="120" y="102" width="20" height="10" fill="#FBB040" stroke="black" stroke-width="0.5"/>
                            <text x="0" y="130" class="simbologia-text">SUMACO</text>    <rect x="120" y="122" width="20" height="10" fill="#F07DBC" stroke="black" stroke-width="0.5"/>
                            <text x="0" y="150" class="simbologia-text">COSANGA</text>   <rect x="120" y="142" width="20" height="10" fill="#F18E65" stroke="black" stroke-width="0.5"/>
                        </g>
                    </g>
                </svg>
            </div>
        </main>

        <!-- Panel Lateral -->
        <aside id="side-panel" class="absolute top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col z-20 border-l border-slate-200">
            <div class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span id="parish-title">Parroquia</span>
                </h2>
                <button id="close-panel-btn" class="text-white hover:text-blue-200 transition-colors p-1 rounded-full hover:bg-blue-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-5">
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-6">
                    <h3 class="text-lg font-medium text-slate-800 mb-3 border-b pb-2">Registrar Nuevo Reporte</h3>
                    <form id="report-form" class="space-y-4">
                        <div>
                            <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Título del Incidente</label>
                            <input type="text" id="title" required placeholder="Ej: Vía cerrada por deslave"
                                class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
                        </div>
                        <div>
                            <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Descripción Detallada</label>
                            <textarea id="description" required rows="3" placeholder="Describe la situación aquí..."
                                class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow resize-none"></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors shadow-sm flex justify-center items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                            </svg>
                            Guardar Reporte
                        </button>
                    </form>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-3 border-b pb-2">
                        <h3 class="text-lg font-medium text-slate-800">Historial de Reportes</h3>
                        <span id="report-count" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="reports-container" class="space-y-3">
                        <p class="text-slate-500 text-sm text-center py-4 italic">No hay reportes registrados para esta zona.</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mapPaths = document.querySelectorAll('.parroquia');
            const sidePanel = document.getElementById('side-panel');
            const closePanelBtn = document.getElementById('close-panel-btn');
            const parishTitle = document.getElementById('parish-title');
            const reportForm = document.getElementById('report-form');
            const titleInput = document.getElementById('title');
            const descInput = document.getElementById('description');
            const reportsContainer = document.getElementById('reports-container');
            const reportCountBadge = document.getElementById('report-count');

            let currentParishId = null;
            const STORAGE_KEY = 'quijos_interactive_reports';
            let reportsData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

            const parishNames = {
                'papallacta': 'Papallacta',
                'cuyuja': 'Cuyuja',
                'baeza': 'Baeza (Cabecera)',
                'borja': 'San Francisco de Borja',
                'sumaco': 'Sumaco',
                'cosanga': 'Cosanga'
            };

            mapPaths.forEach(path => {
                path.addEventListener('click', function() {
                    mapPaths.forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    currentParishId = this.id;
                    parishTitle.textContent = parishNames[this.id] || this.id.toUpperCase();
                    renderReportsList();
                    sidePanel.classList.add('open');
                });
            });

            closePanelBtn.addEventListener('click', () => {
                sidePanel.classList.remove('open');
                mapPaths.forEach(p => p.classList.remove('active'));
                currentParishId = null;
            });

            reportForm.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!currentParishId) return;

                const newReport = {
                    id: Date.now().toString(),
                    title: titleInput.value.trim(),
                    description: descInput.value.trim(),
                    date: new Date().toLocaleString('es-EC', {
                        year: 'numeric', month: 'short', day: 'numeric',
                        hour: '2-digit', minute:'2-digit'
                    })
                };

                if (!reportsData[currentParishId]) reportsData[currentParishId] = [];
                reportsData[currentParishId].unshift(newReport);
                saveData();
                reportForm.reset();
                renderReportsList();

                const btn = reportForm.querySelector('button');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '&#10003; ¡Guardado!';
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);
            });

            function renderReportsList() {
                if (!currentParishId) return;
                const reports = reportsData[currentParishId] || [];
                reportCountBadge.textContent = reports.length;

                if (reports.length === 0) {
                    reportsContainer.innerHTML = `
                        <div class="text-center p-6 bg-slate-50 rounded-lg border border-slate-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-slate-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <p class="text-slate-500 text-sm">No hay reportes registrados.</p>
                            <p class="text-slate-400 text-xs mt-1">Usa el formulario arriba para agregar uno.</p>
                        </div>`;
                    return;
                }

                reportsContainer.innerHTML = reports.map((report, index) => `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:shadow-md transition-shadow relative group">
                        <h4 class="font-bold text-slate-800 pr-6">${report.title}</h4>
                        <p class="text-xs text-slate-500 mb-2 flex items-center gap-1 mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            ${report.date}
                        </p>
                        <p class="text-sm text-slate-700 bg-slate-50 p-2 rounded">${report.description}</p>
                        <button onclick="deleteReport('${currentParishId}', ${index})"
                            class="absolute top-3 right-3 text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity" title="Eliminar reporte">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>`).join('');
            }

            window.deleteReport = function(parishId, reportIndex) {
                if (confirm('¿Eliminar este reporte?')) {
                    reportsData[parishId].splice(reportIndex, 1);
                    saveData();
                    renderReportsList();
                }
            };

            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(reportsData));
            }
        });
    </script>
</body>
</html>
